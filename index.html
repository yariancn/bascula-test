<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PredictaCore | Scanner WL_SC2</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: #0f0; padding: 20px; }
        #log { text-align: left; background: #000; padding: 20px; height: 400px; overflow-y: auto; border: 1px solid #333; font-family: monospace; }
        .btn { background: #00BFFF; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Escáner de Servicios WL_SC2</h2>
    <button class="btn" onclick="escanearServicios()">1. CONECTAR Y MAPEAR</button>
    <div id="log">Esperando acción...</div>

    <script>
        async function escanearServicios() {
            const log = (msg) => document.getElementById('log').innerHTML += `> ${msg}<br>`;
            try {
                log("Iniciando escaneo total...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                log("Conectado a: " + device.name);
                const server = await device.gatt.connect();
                
                log("Obteniendo TODOS los servicios primarios...");
                // Aquí es donde forzamos a la báscula a decir la verdad
                const services = await server.getPrimaryServices();
                
                if (services.length === 0) {
                    log("¡ERROR! La báscula no devolvió servicios. Intenta presionar el botón UNIT 10 segundos.");
                    return;
                }

                for (const s of services) {
                    log("SERVICIO HALLADO: " + s.uuid);
                    const chars = await s.getCharacteristics();
                    for (const c of chars) {
                        log("  └─ Característica: " + c.uuid);
                    }
                }
                log("Escaneo finalizado. Pásame estos códigos.");

            } catch (e) {
                log("ERROR: " + e);
            }
        }
    </script>
</body>
</html>
