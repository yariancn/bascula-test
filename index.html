<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore | Sincronización Directa</title>
    <style>
        :root { --primary: #003087; --accent: #00BFFF; --bg: #f4f7f6; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        #peso { font-size: 5rem; font-weight: bold; color: var(--accent); margin: 20px 0; }
        .unit { font-size: 1.5rem; color: #888; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px 35px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 8px 20px rgba(0,48,135,0.3); }
        #status { font-size: 0.9rem; color: #555; margin-top: 20px; min-height: 40px; }
        #log { font-family: monospace; font-size: 0.7rem; color: #777; text-align: left; background: #f0f0f0; padding: 10px; height: 100px; overflow-y: auto; margin-top: 20px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--primary)">PredictaCore</h2>
        <div id="peso">0.0<span class="unit">kg</span></div>
        <button class="btn" onclick="conectarWyze()">CONECTAR BÁSCULA</button>
        <p id="status">Presiona el botón para iniciar</p>
        <div id="log">Consola lista...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const pesoEl = document.getElementById('peso');
        const logEl = document.getElementById('log');

        function log(msg) {
            logEl.innerHTML += `> ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function conectarWyze() {
            try {
                log("Buscando Wyze Scale...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Wyze' }, { namePrefix: 'Scale' }],
                    optionalServices: ['0000181b-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000181b-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002a9d-0000-1000-8000-00805f9b34fb');

                await characteristic.startNotifications();
                statusEl.innerText = "¡Conectado! Súbete a la báscula.";
                log("Esperando datos...");

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const data = event.target.value;
                    let weightRaw = data.getUint16(1, true);
                    
                    // Ajuste de escala: Wyze usa 0.005 o 0.01 dependiendo del firmware
                    let weightKg = (weightRaw * 0.005).toFixed(1);
                    
                    // Si el peso es ridículamente bajo (ej. marca 55kg cuando pesas 110kg), multiplicamos por 2
                    if (weightKg > 10 && weightKg < 30) { weightKg = (weightRaw * 0.01).toFixed(1); }

                    pesoEl.innerHTML = `${weightKg}<span class="unit">kg</span>`;
                });

                device.addEventListener('gattserverdisconnected', () => {
                    statusEl.innerText = "Desconectado.";
                });

            } catch (error) {
                log("Error: " + error);
            }
        }
    </script>
</body>
</html>
