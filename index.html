<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore | Sincronización WL_SC2</title>
    <style>
        :root { --primary: #003087; --accent: #00BFFF; --bg: #f4f7f6; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        #peso { font-size: 5.5rem; font-weight: 800; color: var(--accent); margin: 15px 0; }
        .unit { font-size: 1.8rem; color: #aaa; }
        .btn { background: var(--primary); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; width: 100%; }
        #status { font-size: 1rem; color: #444; margin-top: 25px; }
        #log { font-family: monospace; font-size: 0.7rem; text-align: left; background: #222; color: #0f0; padding: 15px; height: 120px; overflow-y: auto; margin-top: 25px; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--primary); margin:0;">PredictaCore</h2>
        <p style="color:#888; margin-top:5px;">Conexión Directa WL_SC2</p>
        <div id="peso">0.0<span class="unit">kg</span></div>
        <button class="btn" onclick="conectarWyze()">CONECTAR BÁSCULA</button>
        <p id="status">Presiona para sincronizar</p>
        <div id="log">Esperando dispositivo...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const pesoEl = document.getElementById('peso');
        const logEl = document.getElementById('log');

        function logger(msg) {
            logEl.innerHTML += `> ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function conectarWyze() {
            try {
                logger("Buscando WL_SC2...");
                // Filtro agresivo: Aceptamos el dispositivo y pedimos TODOS los servicios posibles
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'WL_' }, { name: 'WL_SC2' }],
                    optionalServices: [
                        '0000181b-0000-1000-8000-00805f9b34fb',
                        'a530181b-0000-1000-8000-00805f9b34fb', // Wyze Custom
                        '0000181d-0000-1000-8000-00805f9b34fb'
                    ]
                });

                logger("Conectado a: " + device.name);
                const server = await device.gatt.connect();
                
                // ESCÁNER DE SERVICIOS: Buscamos cuál de todos tiene la medición de peso
                logger("Explorando canales de datos...");
                const services = await server.getPrimaryServices();
                
                let characteristicFound = null;

                for (const service of services) {
                    logger("Revisando servicio: " + service.uuid.substring(0, 8));
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        // El UUID 2a9d es el estándar para Weight Measurement
                        if (char.uuid.includes('2a9d') || char.uuid.includes('2a9c')) {
                            characteristicFound = char;
                            break;
                        }
                    }
                    if (characteristicFound) break;
                }

                if (!characteristicFound) {
                    throw new Error("No se encontró canal de peso. Intenta re-emparejar.");
                }

                await characteristicFound.startNotifications();
                logger("¡CANAL ABIERTO!");
                statusEl.innerText = "¡Listo! Súbete a la báscula.";

                characteristicFound.addEventListener('characteristicvaluechanged', (event) => {
                    const data = event.target.value;
                    let weightRaw = data.getUint16(1, true);
                    let weightKg = (weightRaw * 0.01).toFixed(1); // Ajustado para WL_SC2
                    
                    if (parseFloat(weightKg) > 5) {
                        pesoEl.innerHTML = `${weightKg}<span class="unit">kg</span>`;
                        logger("Peso: " + weightKg + " kg");
                    }
                });

            } catch (error) {
                logger("ERROR: " + error);
                statusEl.innerText = "Fallo: " + error.name;
            }
        }
    </script>
</body>
</html>
