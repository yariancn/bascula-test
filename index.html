<!DOCTYPE html>
<html>
<head>
    <title>PredictaCore | WL_SC2 Sniffer</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #0f0; padding: 20px; }
        #log { text-align: left; background: #111; padding: 20px; height: 300px; overflow-y: auto; border: 1px solid #333; font-family: monospace; }
        .btn { background: #00BFFF; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Sniffer de Datos WL_SC2</h2>
    <button class="btn" onclick="escucharAnuncios()">INICIAR ESCUCHA</button>
    <div id="log">Haz clic y luego súbete a la báscula...</div>

    <script>
        async function escucharAnuncios() {
            const log = (msg) => { document.getElementById('log').innerHTML += `> ${msg}<br>`; };
            try {
                log("Activando modo escucha (Bluetooth Scan)...");
                
                // Esta función busca dispositivos cercanos sin conectarse a ellos
                const browser = await navigator.bluetooth.requestLEScan({
                    filters: [{ name: 'WL_SC2' }],
                    keepRepeatedDevices: true
                });

                log("Escuchando... Súbete a la báscula ahora.");

                navigator.bluetooth.addEventListener('advertisementreceived', event => {
                    log("¡Paquete recibido de " + event.device.name + "!");
                    
                    // Las Wyze modernas mandan el peso en el "Manufacturer Data"
                    if (event.manufacturerData) {
                        for (let [id, data] of event.manufacturerData) {
                            log("Datos de fabricante detectados...");
                            // Intentamos encontrar el peso en los bytes del anuncio
                            if (data.byteLength >= 4) {
                                let weight = (data.getUint16(2, false) * 0.1).toFixed(1);
                                log("POSIBLE PESO DETECTADO: " + weight + " kg");
                            }
                        }
                    }
                });

            } catch (e) {
                log("ERROR: " + e);
                log("TIP: Asegúrate de que 'Experimental Web Platform features' esté activado en chrome://flags");
            }
        }
    </script>
</body>
</html>
