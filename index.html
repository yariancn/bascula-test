<script>
async function conectarBascula() {
    const $status = document.getElementById('status');
    const $log = document.getElementById('log');

    try {
        $status.textContent = "Scanning for ANY device...";
        $log.innerHTML += "> Requesting any Bluetooth device...<br>";

        // Quitamos los filtros de nombre para ver todo lo que hay cerca
        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['weight_scale', 'body_composition', 0x181D, 0x181B] 
        });

        $status.textContent = `Found: ${device.name || 'Unnamed Device'}`;
        $log.innerHTML += `> Connected to ${device.name}<br>`;
        
        const server = await device.gatt.connect();
        alert("Connected to " + (device.name || "Device") + ". Checking services...");

    } catch (error) {
        $log.innerHTML += `<span class="text-red-500 italic">Error: ${error}</span><br>`;
        $status.textContent = "Scan failed.";
    }
}
</script>
