<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore | Enlace Directo Wyze</title>
    <style>
        :root { --primary: #003087; --accent: #00BFFF; --bg: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 420px; width: 100%; }
        #peso { font-size: 5.5rem; font-weight: 800; color: var(--accent); margin: 15px 0; letter-spacing: -2px; }
        .unit { font-size: 1.8rem; color: #aaa; margin-left: 5px; }
        .btn { background: var(--primary); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 10px 25px rgba(0,48,135,0.3); transition: all 0.2s; }
        .btn:active { transform: scale(0.97); }
        #status { font-size: 1rem; color: #444; margin-top: 25px; font-weight: 500; min-height: 24px; }
        #log { font-family: 'Courier New', Courier, monospace; font-size: 0.75rem; color: #666; text-align: left; background: #222; color: #0f0; padding: 15px; height: 120px; overflow-y: auto; margin-top: 25px; border-radius: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--primary); margin:0;">PredictaCore</h2>
        <p style="color:#888; margin-top:5px;">Sincronización de Báscula</p>
        
        <div id="peso">0.0<span class="unit">kg</span></div>
        
        <button class="btn" onclick="conectarWyze()">BUSCAR DISPOSITIVOS</button>
        
        <p id="status">Presiona el botón para escanear</p>
        
        <div id="log">Sistema listo. Esperando inicio...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const pesoEl = document.getElementById('peso');
        const logEl = document.getElementById('log');

        function logger(msg) {
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
            logEl.innerHTML += `[${time}] ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function conectarWyze() {
            try {
                logger("Iniciando escaneo Bluetooth...");
                statusEl.innerText = "Escaneando dispositivos...";

                // Usamos acceptAllDevices para ver TODO lo que hay cerca
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '0000181b-0000-1000-8000-00805f9b34fb', // Servicio de Peso (ESS)
                        '0000181d-0000-1000-8000-00805f9b34fb'  // Composición Corporal (BCS)
                    ]
                });

                logger("Dispositivo seleccionado: " + device.name);
                statusEl.innerText = "Conectando al GATT Server...";

                const server = await device.gatt.connect();
                logger("Servidor conectado.");

                // Intentamos acceder al servicio estándar de medición de peso
                const service = await server.getPrimaryService('0000181b-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002a9d-0000-1000-8000-00805f9b34fb');

                await characteristic.startNotifications();
                logger("Notificaciones activas. Esperando pesada.");
                statusEl.innerText = "¡Sincronizado! Súbete a la báscula.";

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const data = event.target.value;
                    
                    // Decodificación estándar BLE Weight Scale
                    // Byte 0: Flags | Byte 1-2: Peso (Uint16)
                    const weightRaw = data.getUint16(1, true); 
                    
                    // Ajuste de resolución (0.005 o 0.01 según el modelo)
                    let weightKg = (weightRaw * 0.005).toFixed(1);
                    
                    // Verificación de escala
                    if (parseFloat(weightKg) > 10 && parseFloat(weightKg) < 40) {
                        weightKg = (weightRaw * 0.01).toFixed(1);
                    }

                    if (parseFloat(weightKg) > 2) {
                        pesoEl.innerHTML = `${weightKg}<span class="unit">kg</span>`;
                        logger("Lectura de peso: " + weightKg + " kg");
                    }
                });

                device.addEventListener('gattserverdisconnected', () => {
                    logger("Aviso: Báscula desconectada.");
                    statusEl.innerText = "Desconectado. Pulsa para volver a intentar.";
                });

            } catch (error) {
                logger("ERROR: " + error);
                statusEl.innerText = "Fallo en la conexión.";
            }
        }
    </script>
</body>
</html>
