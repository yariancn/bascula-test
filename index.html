<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore | WL_SC2 Direct Link</title>
    <style>
        :root { --primary: #003087; --accent: #00BFFF; --bg: #f4f7f6; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        #peso { font-size: 5.5rem; font-weight: 800; color: var(--accent); margin: 15px 0; }
        .btn { background: var(--primary); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; width: 100%; }
        #log { font-family: monospace; font-size: 0.75rem; text-align: left; background: #1a1a1a; color: #00ff00; padding: 15px; height: 130px; overflow-y: auto; margin-top: 20px; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--primary); margin:0;">PredictaCore</h2>
        <p style="color:#888;">Enlace Directo WL_SC2</p>
        <div id="peso">0.0<span style="font-size:1.5rem; color:#aaa;">kg</span></div>
        <button class="btn" onclick="conectarWyze()">SINCRONIZAR PESO</button>
        <p id="status" style="margin-top:15px;">Presiona el botón UNIT atrás 3 seg.</p>
        <div id="log">Esperando...</div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        function logger(msg) { logEl.innerHTML += `> ${msg}<br>`; logEl.scrollTop = logEl.scrollHeight; }

        async function conectarWyze() {
            try {
                logger("Solicitando acceso a WL_SC2...");
                
                // Forzamos la visibilidad del servicio de datos de Wyze (1314)
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'WL_SC2' }],
                    optionalServices: [
                        '00001314-0000-1000-8000-00805f9b34fb', // Canal Maestro Wyze
                        '0000181b-0000-1000-8000-00805f9b34fb'  // Canal Estándar
                    ]
                });

                const server = await device.gatt.connect();
                logger("Conectado. Desbloqueando canales...");

                // Intentamos entrar por el túnel personalizado de Wyze
                const service = await server.getPrimaryService('00001314-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00001314-0000-1000-8000-00805f9b34fb');

                await characteristic.startNotifications();
                logger("¡CANAL ABIERTO! Súbete ya.");

                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const data = e.target.value;
                    
                    // En el protocolo 1314 de Wyze, el peso suele venir a partir del byte 12
                    // o en paquetes de 19 bytes. Vamos a intentar capturarlo:
                    if (data.byteLength >= 4) {
                        const weightRaw = data.getUint16(2, false); // Offset típico para este modelo
                        const weightKg = (weightRaw * 0.1).toFixed(1);

                        if (weightKg > 20 && weightKg < 200) {
                            document.getElementById('peso').innerHTML = `${weightKg}<span style="font-size:1.5rem; color:#aaa;">kg</span>`;
                            logger("Lectura: " + weightKg + " kg");
                        }
                    }
                });

            } catch (error) {
                logger("ERROR: " + error.message);
                if (error.message.includes("not found")) {
                    logger("La báscula requiere reinicio de Bluetooth (Botón UNIT).");
                }
            }
        }
    </script>
</body>
</html>
