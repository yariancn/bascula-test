<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore | Control WL_SC2</title>
    <style>
        :root { --primary: #003087; --accent: #00BFFF; --bg: #f4f7f6; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 100%; 
        }
        #peso { 
            font-size: 5.5rem; 
            font-weight: 800; 
            color: var(--accent); 
            margin: 15px 0; 
            letter-spacing: -2px;
        }
        .unit { font-size: 1.8rem; color: #aaa; margin-left: 5px; }
        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            border-radius: 50px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 10px 25px rgba(0,48,135,0.3); 
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        #status { font-size: 1rem; color: #444; margin-top: 25px; font-weight: 500; min-height: 24px; }
        #log { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.75rem; 
            text-align: left; 
            background: #1a1a1a; 
            color: #00ff00; 
            padding: 15px; 
            height: 130px; 
            overflow-y: auto; 
            margin-top: 25px; 
            border-radius: 12px; 
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--primary); margin:0;">PredictaCore</h2>
        <p style="color:#888; margin-top:5px;">Sincronización Directa</p>
        
        <div id="peso">0.0<span class="unit">kg</span></div>
        
        <button class="btn" onclick="conectarWyze()">CONECTAR BÁSCULA</button>
        
        <p id="status">Presiona para iniciar</p>
        
        <div id="log">Consola de sistema lista...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const pesoEl = document.getElementById('peso');
        const logEl = document.getElementById('log');

        function logger(msg) {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            logEl.innerHTML += `[${time}] ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        async function conectarWyze() {
            try {
                logger("Iniciando escaneo de WL_SC2...");
                statusEl.innerText = "Buscando dispositivo...";

                // SOLUCIÓN: El servicio DEBE estar en el filtro inicial para que macOS lo reconozca
                const device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'WL_SC2' },
                        { services: ['0000181b-0000-1000-8000-00805f9b34fb'] }
                    ],
                    optionalServices: ['0000181b-0000-1000-8000-00805f9b34fb']
                });

                logger("Conectado a: " + device.name);
                statusEl.innerText = "Vinculando canales...";

                const server = await device.gatt.connect();
                logger("Servidor GATT conectado.");

                // Acceso directo al servicio de Peso
                const service = await server.getPrimaryService('0000181b-0000-1000-8000-00805f9b34fb');
                logger("Servicio 181B encontrado.");

                // Acceso a la característica de Medición
                const characteristic = await service.getCharacteristic('00002a9d-0000-1000-8000-00805f9b34fb');
                logger("Canal 2A9D abierto.");

                await characteristic.startNotifications();
                logger("Sincronización completa. Esperando peso...");
                statusEl.innerText = "¡Listo! Súbete a la báscula.";

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const data = event.target.value;
                    
                    // Decodificación: Byte 1 y 2 contienen el peso
                    const weightRaw = data.getUint16(1, true); 
                    
                    // Ajuste de escala para el modelo WL_SC2 (normalmente 0.01)
                    let weightKg = (weightRaw * 0.01).toFixed(1);

                    // Si el dato es coherente (> 5kg), actualizamos la pantalla
                    if (parseFloat(weightKg) > 5) {
                        pesoEl.innerHTML = `${weightKg}<span class="unit">kg</span>`;
                        logger("Captura: " + weightKg + " kg");
                    }
                });

                device.addEventListener('gattserverdisconnected', () => {
                    logger("Aviso: Conexión perdida.");
                    statusEl.innerText = "Desconectado. Pulsa para reintentar.";
                });

            } catch (error) {
                logger("ERROR: " + error.message);
                statusEl.innerText = "Fallo en la comunicación.";
                
                if (error.message.includes("No Services")) {
                    logger("TIP: Elimina WL_SC2 de tus ajustes BT y reinicia Bluetooth.");
                }
            }
        }
    </script>
</body>
</html>
