<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Withings BLE Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-md mx-auto bg-slate-800 p-8 rounded-3xl shadow-2xl text-center border border-slate-700">
        <h1 class="text-xl font-bold mb-2">Withings Scanner</h1>
        <p class="text-slate-400 text-xs mb-6">Testing Standard WSS Protocol</p>
        
        <div id="status" class="mb-4 text-blue-400 font-mono text-xs uppercase">Ready to scan</div>
        
        <div class="text-6xl font-black mb-8 text-white">
            <span id="pesoRealTime">0.0</span> <span class="text-2xl text-slate-500">kg</span>
        </div>

        <button onclick="testWithings()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-500 transition shadow-lg">
            Search Withings Scale
        </button>

        <div id="log" class="mt-6 text-left text-[10px] text-slate-500 h-40 overflow-auto font-mono bg-slate-900 p-4 rounded-xl border border-slate-700">
            > System initialized...<br>
        </div>
    </div>

    <script>
        async function testWithings() {
            const $status = document.getElementById('status');
            const $log = document.getElementById('log');
            const $peso = document.getElementById('pesoRealTime');

            try {
                $status.textContent = "Searching...";
                $log.innerHTML += "> Requesting Withings/Standard Scale...<br>";

                // Withings suele anunciar el servicio estándar 0x181D (Weight Scale)
                // o 0x181B (Body Composition)
                const device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { namePrefix: 'Withings' },
                        { services: [0x181D] }
                    ],
                    optionalServices: [0x181B, 'device_information']
                });

                $status.textContent = "Found: " + device.name;
                $log.innerHTML += `> Device spotted: ${device.name}<br>`;

                const server = await device.gatt.connect();
                $log.innerHTML += "> GATT Server connected...<br>";

                // Intentar obtener el servicio de peso
                const service = await server.getPrimaryService(0x181D);
                const characteristic = await service.getCharacteristic(0x2A9D); // Weight Measurement

                $log.innerHTML += "> Characteristic found. Starting notifications...<br>";

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;
                    // El estándar WSS envía el peso en los bytes 1 y 2
                    // El valor suele estar en kg * 0.005 o kg * 0.5 según el flag
                    const weight = value.getUint16(1, true) * 0.005; 
                    $peso.textContent = weight.toFixed(2);
                    $log.innerHTML += `> Weight received: ${weight.toFixed(2)} kg<br>`;
                });

                alert("Successfully linked to Withings. Stand on the scale.");

            } catch (error) {
                $log.innerHTML += `<span class="text-red-400">> Error: ${error}</span><br>`;
                $status.textContent = "Scan stopped";
            }
        }
    </script>
</body>
</html>
