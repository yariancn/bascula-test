<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PredictaCore | WL_SC2 Force</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; }
        #peso { font-size: 5rem; color: #00BFFF; font-weight: bold; }
        #log { font-family: monospace; font-size: 0.7rem; text-align: left; background: #222; color: #0f0; padding: 15px; height: 150px; overflow-y: auto; margin-top: 20px; border-radius: 10px; }
        .btn { background: #003087; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>PredictaCore</h2>
        <div id="peso">0.0 kg</div>
        <button class="btn" onclick="conectar()">FORZAR SINCRONIZACIÓN</button>
        <div id="log">Esperando...</div>
    </div>

    <script>
        const log = (msg) => { document.getElementById('log').innerHTML += `> ${msg}<br>`; };

        async function conectar() {
            try {
                log("Pidiendo permiso total...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    // Incluimos TODOS los posibles servicios de Wyze para que el Mac los 'desbloquee'
                    optionalServices: [
                        '0000181b-0000-1000-8000-00805f9b34fb',
                        '00001314-0000-1000-8000-00805f9b34fb',
                        '0000ff01-0000-1000-8000-00805f9b34fb', // Servicio alternativo Wyze
                        '0000180a-0000-1000-8000-00805f9b34fb'
                    ]
                });

                log("Conectado a: " + device.name);
                const server = await device.gatt.connect();

                log("Buscando servicios de datos...");
                const services = await server.getPrimaryServices();
                
                if (services.length <= 1) {
                    log("Báscula bloqueada. PISA LA BÁSCULA y dale a CONECTAR de nuevo sin soltar el botón UNIT.");
                    return;
                }

                // Si llegamos aquí, hemos desbloqueado los servicios
                for (const service of services) {
                    log("Hallado: " + service.uuid);
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        if (char.properties.notify) {
                            log("Escuchando en: " + char.uuid.substring(0,8));
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', (e) => {
                                const val = e.target.value;
                                log("Dato crudo recibido!");
                                // Lógica de peso simplificada para ver si responde
                                document.getElementById('peso').innerText = "RECIBIENDO...";
                            });
                        }
                    }
                }
            } catch (e) {
                log("Error: " + e);
            }
        }
    </script>
</body>
</html>
